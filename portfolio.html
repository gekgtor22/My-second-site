<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио — Urban Lines Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Urban Lines</a>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="about.html">О нас</a></li>
            <li><a href="services.html">Услуги</a></li>
            <li><a href="contacts.html">Контакты</a></li>
        </ul>
    </header>

    <main class="container">
        <h2>Портфолио</h2>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="apartments">Квартиры</button>
            <button class="filter-btn" data-filter="houses">Дома</button>
            <button class="filter-btn" data-filter="commercial">Коммерция</button>
        </div>
        <div class="portfolio-grid">
            <div class="portfolio-item" data-category="apartments">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&h=400&fit=crop" alt="Квартира">
                <div class="portfolio-overlay"><span>Минималистичная квартира</span></div>
            </div>
            <div class="portfolio-item" data-category="houses">
                <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600&h=400&fit=crop" alt="Дом">
                <div class="portfolio-overlay"><span>Загородный дом</span></div>
            </div>
            <div class="portfolio-item" data-category="commercial">
                <img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=600&h=400&fit=crop" alt="Ресторан">
                <div class="portfolio-overlay"><span>Ресторан «Геометрия»</span></div>
            </div>
            <div class="portfolio-item" data-category="apartments">
                <img src="https://images.unsplash.com/photo-1600566753086-00f18f6b0050?w=600&h=400&fit=crop" alt="Интерьер">
                <div class="portfolio-overlay"><span>Студия на Патриарших</span></div>
            </div>
            <div class="portfolio-item" data-category="commercial">
                <img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e?w=600&h=400&fit=crop" alt="Офис">
                <div class="portfolio-overlay"><span>Офис IT-компании</span></div>
            </div>
            <div class="portfolio-item" data-category="houses">
                <img src="https://images.unsplash.com/photo-1600585154363-67eb9e2e2099?w=600&h=400&fit=crop" alt="Таунхаус">
                <div class="portfolio-overlay"><span>Современный таунхаус</span></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        © 2025 Urban Lines Studio. Все права защищены.
    </footer>

    <script src="script.js"></script>
</body>
</html>
